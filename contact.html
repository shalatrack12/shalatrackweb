<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact ShalaTrack</title>


 <link rel="stylesheet" href="css/styles.css"></head>


</head>

<body>

<header class="navbar">

<div class="logo-container">
<a href="index.html">
<img src="images/logo.png" alt="ShalaTrack Logo" class="main-logo">
</a>
</div>

<nav>
<a href="index.html">Home</a>
<a href="pricing.html">Pricing</a>
<a href="about.html">About</a>
<a href="contact.html">Contact</a>
</nav>

<button class="btn">Get Started</button>

</header>


<section class="contact-section">

<h1>Contact Us</h1>

<p class="tagline">
Let’s help you digitize your school 🚀
</p>

<div class="contact-box">

<!-- LEFT -->
<div class="contact-info">
  <h2>Get in Touch</h2>

  <p>📧 shalatrack@gmail.com</p>

  <p>📱 +91 6309542241</p>

  <p>We usually reply within a few hours.</p>
</div>

<!-- RIGHT -->
<div class="contact-form-box">

<div id="success-message" style="display:none; text-align:center;">

<div class="success-icon">✅</div>

<h3>Message Sent Successfully!</h3>

<p>Our team will contact you soon.</p>

<a href="index.html" class="btn">Go Home</a>

</div>


<form id="contact-form"
action="https://formspree.io/f/mykngyad"
method="POST">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<textarea name="message" placeholder="Message" required></textarea>

<button type="submit" id="submit-btn">
Send Message
</button>

</form>

</div>

</div>

</section>


<footer>
<p>© 2026 ShalaTrack Technologies Pvt Ltd</p>
</footer>


<script>

const form = document.getElementById('contact-form');
const successMsg = document.getElementById('success-message');
const submitBtn = document.getElementById('submit-btn');

form.addEventListener("submit", async function(event) {

event.preventDefault();
submitBtn.innerHTML = "Sending...";
submitBtn.disabled = true;

const data = new FormData(event.target);

fetch(event.target.action, {
method: form.method,
body: data,
headers: {
'Accept': 'application/json'
}

}).then(response => {

if (response.ok) {
form.style.display = 'none';
successMsg.style.display = 'block';
} else {
alert("Oops! Try again.");
submitBtn.innerHTML = "Send Message";
submitBtn.disabled = false;
}

}).catch(error => {
alert("Check internet connection.");
submitBtn.innerHTML = "Send Message";
submitBtn.disabled = false;
});

});

</script>

</body>
</html>
